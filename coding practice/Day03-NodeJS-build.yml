##Jenkins pieline - Build NodeJS application, you will learn how to build a NodeJS application using Jenkins pipeline learn how to install dependencies and run tests and build a NodeJS project

pipeline {
    agent any
      tools {
        nodejs "NodeJS-16"
      }
    stages {
        stage('Checkout') {
            steps {
                url: 'https://github.com/Pathnex/sample-nodejs-app.git'
            }
        }
        stage('Install Dependencies') {
            steps {
                sh 'npm install'
            }
        }
        stage('Run Tests') {
            steps {
                sh 'npm test'
            }
        }
        stage('Build') {
            steps {
                sh 'npm run build'
            }
        }
    }
}