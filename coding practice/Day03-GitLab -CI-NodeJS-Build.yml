##GitLab CI - NodeJS Build
stages:
  - install
  - test
  - build
node-install:
  stage: install
  image: node:16
  script:
    - git clone https://github.com/Pathnex/sample-nodejs-app.git
    - cd sample-nodejs-app
    - npm install

node-test:
  stage: test
  image: node:16
  script:
    - cd sample-nodejs-app
    - npm test

node-build:
  stage: build
  image: node:16
  script:
    - cd sample-nodejs-app
    - npm run build
